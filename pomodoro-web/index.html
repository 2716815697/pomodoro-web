<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍅 番茄钟</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-wrapper">
    <!-- 侧边栏：专注记录（左） -->
    <div class="side-panel side-left" id="sideLeft">
      <button class="history-toggle" id="historyToggle">📋 专注记录</button>
    </div>

    <div class="card" role="main">
  <!-- 登录/注册区域 -->
  <div id="authContainer"></div>

  <!-- 应用主区域（登录后显示） -->
  <div id="appContainer" style="display:none">
    <div class="card-header">
      <div id="userHeader"></div>
      <h1>🍅 番茄钟</h1>
      <p class="subtitle" id="statusText">准备就绪</p>
    </div>

    <!-- 环形倒计时 -->
    <div class="card-body">
      <div class="timer-ring" id="timerRing">
      <svg viewBox="0 0 100 100" aria-hidden="true">
        <circle class="ring-bg" cx="50" cy="50" r="44"/>
        <circle class="ring-fg" id="progressCircle"
          cx="50" cy="50" r="44"
          stroke-dasharray="276.46" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-text">
        <span class="time" id="timerDisplay">25:00</span>
        <span class="phase-label" id="phaseLabel">🎯 专注</span>
      </div>
    </div>

    <!-- 轮次指示 -->
    <div class="round-track" id="roundDots" aria-label="轮次进度"></div>

    <!-- 操作按钮 -->
    <div class="controls">
      <button class="btn btn-primary" id="startBtn">▶ 开始</button>
      <button class="btn btn-secondary" id="skipBtn">⏭ 跳过</button>
      <button class="btn btn-secondary" id="resetBtn" title="重置">↻ 重置</button>
    </div>

    </div><!-- /.card-body -->

    <div class="card-footer">
      <!-- 设置 -->
    <div class="settings">
      <div class="setting-item">
        <label for="focusInput">专注 (分)</label>
        <div class="num-stepper">
          <button class="step-btn" data-input="focusInput" data-dir="-1">−</button>
          <input type="number" id="focusInput" value="25" min="1" max="120">
          <button class="step-btn" data-input="focusInput" data-dir="1">+</button>
        </div>
      </div>
      <div class="setting-item">
        <label for="breakInput">休息 (分)</label>
        <div class="num-stepper">
          <button class="step-btn" data-input="breakInput" data-dir="-1">−</button>
          <input type="number" id="breakInput" value="5" min="1" max="30">
          <button class="step-btn" data-input="breakInput" data-dir="1">+</button>
        </div>
      </div>
      <div class="setting-item">
        <label for="roundsInput">轮次</label>
        <div class="num-stepper">
          <button class="step-btn" data-input="roundsInput" data-dir="-1">−</button>
          <input type="number" id="roundsInput" value="4" min="1" max="20">
          <button class="step-btn" data-input="roundsInput" data-dir="1">+</button>
        </div>
      </div>
    </div>

    <div class="card-footer-actions">
      <!-- 音效选择 -->
      <div class="sound-selector">
        <button class="active" data-sound="bell">🔔 铃铛</button>
        <button data-sound="digital">📱 电子</button>
        <button data-sound="gentle">🎵 轻柔</button>
      </div>
    </div>
    </div>
  </div><!-- /#appContainer -->
  </div><!-- /.card -->
    <!-- sidebar: keyboard hints -->
    <div class="side-panel side-right" id="sideRight">
      <div class="shortcut-list">
        <div class="shortcut-item">
          <kbd>Space</kbd>
          <span>暂停</span>
        </div>
        <div class="shortcut-item">
          <kbd>S</kbd>
          <span>跳过</span>
        </div>
        <div class="shortcut-item">
          <kbd>R</kbd>
          <span>重置</span>
        </div>
      </div>
    </div>
  </div><!-- /.app-wrapper -->
<!-- 装饰元素 -->
<div class="deco-ring deco-ring--tl"></div>
<div class="deco-ring deco-ring--br"></div>
<div class="deco-ring deco-ring--tr"></div>
<div class="deco-ring deco-ring--bl"></div>
<div class="deco-line deco-line--left"></div>
<div class="deco-line deco-line--right"></div>

<!-- ====== 阶段结束弹窗 ====== -->
<div class="modal-overlay" id="phaseModal">
  <div class="modal-box">
    <div class="modal-icon" id="modalIcon">🎯</div>
    <h2 id="modalTitle">专注结束</h2>
    <p id="modalDesc">该休息一下了</p>
    <button class="btn btn-primary" id="modalContinueBtn">继续</button>
  </div>
</div>

<!-- ====== 专注记录弹窗 ====== -->
<div class="modal-overlay" id="historyModal">
  <div class="modal-box modal-history">
    <h2>📋 专注记录</h2>
    <div class="history-list" id="historyList"></div>
    <div class="history-modal-actions">
      <button class="btn btn-secondary" id="historyClear">清空记录</button>
      <button class="btn btn-primary" id="historyClose">关闭</button>
    </div>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
